# Docker环境配置
spring:
  application:
    name: ruoyi-data-cleaning

  # 数据库配置 - Docker环境使用docker-compose定义的服务名
  datasource:
    url: jdbc:postgresql://postgres:5432/ruoyi
    username: ruoyi
    password: ruoyi123
    driver-class-name: org.postgresql.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis配置 - Docker环境使用docker-compose定义的服务名
  redis:
    host: redis
    port: 6379
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ruoyi.**.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# MinIO配置 - Docker环境使用docker-compose定义的服务名
minio:
  endpoint: http://minio:9000
  accessKey: minioadmin
  secretKey: minioadmin123
  bucket-name: ruoyi

# 系统监控配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.ruoyi: INFO
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
