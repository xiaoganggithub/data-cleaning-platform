version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./RuoYi-Vue-springboot3
      dockerfile: Dockerfile
    container_name: ruoyi-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ruoyi
      - SPRING_DATASOURCE_USERNAME=ruoyi
      - SPRING_DATASOURCE_PASSWORD=ruoyi123
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - ruoyi-network

  # 前端服务
  frontend:
    build:
      context: ./RuoYi-Vue3
      dockerfile: Dockerfile
    container_name: ruoyi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ruoyi-network

  # PostgreSQL数据库
  postgres:
    image: postgres:14
    container_name: ruoyi-postgres
    environment:
      - POSTGRES_DB=ruoyi
      - POSTGRES_USER=ruoyi
      - POSTGRES_PASSWORD=ruoyi123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./RuoYi-Vue-springboot3/sql:/docker-entrypoint-initdb.d
    networks:
      - ruoyi-network

  # Redis缓存
  redis:
    image: redis:7
    container_name: ruoyi-redis
    ports:
      - "6379:6379"
    networks:
      - ruoyi-network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: ruoyi-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - ruoyi-network

volumes:
  postgres-data:
  minio-data:

networks:
  ruoyi-network:
    driver: bridge
