<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="/favicon.ico">
  <title>%VITE_APP_TITLE%</title>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <style>
    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
    }

    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      will-change: opacity, transform;
    }

    #loader-wrapper.fade-out {
      animation: loader-fade-out 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loader-fade-out {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.1);
      }
    }

    #loader {
      display: block;
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #06b6d4;
      animation: spin 1.5s linear infinite;
      z-index: 1001;
      will-change: transform;
    }

    #loader:before {
      content: "";
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #a78bfa;
      animation: spin 2s linear infinite reverse;
      z-index: 1001;
      will-change: transform;
    }

    #loader:after {
      content: "";
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #22d3ee;
      animation: spin 1s linear infinite;
      z-index: 1001;
      will-change: transform;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #loader-wrapper .loading-tip {
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: 2px;
      text-align: center;
      z-index: 1002;
      position: relative;
      animation: tip-pulse 2s ease-in-out infinite;
    }

    @keyframes tip-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loaded #loader-wrapper {
      animation: loader-exit 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes loader-exit {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-30px) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loader-wrapper">
    <div id="loader"></div>
    <div class="loading-tip">正在加载系统资源，请稍候</div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      // 等待 Vue 应用挂载完成
      var checkApp = setInterval(function() {
        var app = document.getElementById('app');
        if (app && app.children.length > 0) {
          clearInterval(checkApp);
          setTimeout(function() {
            document.body.classList.add('loaded');
            setTimeout(function() {
              var loader = document.getElementById('loader-wrapper');
              if (loader) {
                loader.style.display = 'none';
              }
            }, 800);
          }, 300);
        }
      }, 50);
      
      // 最大等待时间
      setTimeout(function() {
        document.body.classList.add('loaded');
      }, 3000);
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
